        id="flowerName"
        placeholder="ชื่อดอกไม้"

        id="flowerPrice"
        placeholder="ราคา (บาท)"

        type="number"
        id="flowerStock"
        placeholder="จำนวนคงเหลือ"
        >

        class="save"
        onclick="addFlower()">
