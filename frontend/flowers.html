<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการดอกไม้</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2>🌸 Blossom Flower Shop</h2>

    <ul>
        <li><a href="index.html">🏠 หน้าแรก</a></li>
        <li><a href="flowers.html">🌹 ดอกไม้</a></li>
        <li><a href="categories.html">🌼 หมวดหมู่</a></li>
        <li><a href="customers.html">👤 ลูกค้า</a></li>
        <li><a href="orders.html">🛒 ออเดอร์</a></li>
    </ul>
</nav>

<div class="container">

    <div class="card">

        <h2>🌹 จัดการข้อมูลดอกไม้</h2>

        <input type="text" id="flowerName" placeholder="ชื่อดอกไม้">

        <input type="number" id="flowerPrice" placeholder="ราคา (บาท)">

        <input type="number" id="flowerStock" placeholder="จำนวนคงเหลือ">

        <button class="save" onclick="addFlower()">
            ➕ เพิ่มดอกไม้
        </button>

    </div>

    <div class="card">

        <table>

            <thead>

                <tr>
                    <th>ลำดับ</th>
                    <th>🌸 ชื่อดอกไม้</th>
                    <th>💰 ราคา</th>
                    <th>📦 จำนวน</th>
                    <th>⚙️ จัดการ</th>
                </tr>

            </thead>

            <tbody id="flowerTable">

            </tbody>

        </table>

    </div>

</div>

<script src="flower.js"></script>

</body>
</html>
